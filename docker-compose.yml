version: '3.9'

services:
  # JONA FastAPI Backend
  jona-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jona-api
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - DEBUG=true
      - DATABASE_URL=postgresql://jona:jona_secure_pass@postgres:5432/jona_db
      - REDIS_URL=redis://redis:6379/0
      - MONGO_URL=mongodb://mongo:27017
      - JWT_SECRET=your-jwt-secret-key-change-in-production
      - LOG_LEVEL=INFO
    volumes:
      - ./jona:/app/jona
      - ./data:/app/data
    depends_on:
      - postgres
      - redis
      - mongo
    networks:
      - jona-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: jona-postgres
    environment:
      - POSTGRES_USER=jona
      - POSTGRES_PASSWORD=jona_secure_pass
      - POSTGRES_DB=jona_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jona-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jona"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: jona-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jona-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # MongoDB
  mongo:
    image: mongo:7
    container_name: jona-mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=jona
      - MONGO_INITDB_ROOT_PASSWORD=mongo_secure_pass
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - jona-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: jona-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - jona-network
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: jona-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - jona-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongo_data:
  prometheus_data:
  grafana_data:

networks:
  jona-network:
    driver: bridge
