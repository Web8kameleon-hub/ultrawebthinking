---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: jona-production
  labels:
    name: jona-production

---
# ConfigMap - Environment Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: jona-config
  namespace: jona-production
data:
  ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

---
# Secret - Sensitive Data
apiVersion: v1
kind: Secret
metadata:
  name: jona-secrets
  namespace: jona-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://jona:$(POSTGRES_PASSWORD)@postgres-service:5432/jona_db"
  REDIS_URL: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
  MONGO_URL: "mongodb://jona:$(MONGO_PASSWORD)@mongo-service:27017"
  JWT_SECRET: "your-super-secret-jwt-key-change-this-in-production"
  POSTGRES_PASSWORD: "hetzner-secure-postgres-password-2026"
  REDIS_PASSWORD: "hetzner-secure-redis-password-2026"
  MONGO_PASSWORD: "hetzner-secure-mongo-password-2026"

---
# StatefulSet - PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: jona-production
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: jona_db
        - name: POSTGRES_USER
          value: jona
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jona-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U jona
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U jona
          initialDelaySeconds: 5
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi

---
# Service - PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: jona-production
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# StatefulSet - Redis
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: jona-production
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - "--appendonly"
        - "yes"
        - "--requirepass"
        - "$(REDIS_PASSWORD)"
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: jona-secrets
              key: REDIS_PASSWORD
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
# Service - Redis
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: jona-production
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# Deployment - JONA API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jona-api
  namespace: jona-production
  labels:
    app: jona-api
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: jona-api
  template:
    metadata:
      labels:
        app: jona-api
        version: v1
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - jona-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: jona-api
        image: web8kameleon-hub/jona:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ENV
          valueFrom:
            configMapKeyRef:
              name: jona-config
              key: ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: jona-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: jona-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: jona-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jona-secrets
              key: JWT_SECRET
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
# Service - JONA API
apiVersion: v1
kind: Service
metadata:
  name: jona-api-service
  namespace: jona-production
  labels:
    app: jona-api
spec:
  type: ClusterIP
  selector:
    app: jona-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: jona-api-hpa
  namespace: jona-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jona-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Ingress - HTTPS
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jona-ingress
  namespace: jona-production
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - jona.yourdomain.com
    secretName: jona-tls-cert
  rules:
  - host: jona.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: jona-api-service
            port:
              number: 80

---
# Certificate - Let's Encrypt
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: jona-cert
  namespace: jona-production
spec:
  secretName: jona-tls-cert
  duration: 2160h # 90d
  renewBefore: 720h # 30d
  commonName: jona.yourdomain.com
  dnsNames:
  - jona.yourdomain.com
  - "*.jona.yourdomain.com"
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

---
# ClusterIssuer - Let's Encrypt Production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx

---
# NetworkPolicy - Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jona-network-policy
  namespace: jona-production
spec:
  podSelector:
    matchLabels:
      app: jona-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
