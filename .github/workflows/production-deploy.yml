name: Production Deployment Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'backend/**'
      - 'jona/**'
      - 'frontend/**'
      - 'Dockerfile.prod'
      - 'k8s-production.yaml'
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: web8kameleon-hub/jona

jobs:
  # Stage 1: Code Quality & Testing
  test:
    name: Test & Quality
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio flake8 mypy black
    
    - name: Code formatting check
      run: black --check jona/ backend/ 2>/dev/null || true
    
    - name: Lint with flake8
      run: flake8 jona/ backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Type checking with mypy
      run: mypy jona/ --ignore-missing-imports || true
    
    - name: Run pytest
      run: pytest --tb=short -v 2>/dev/null || echo "No tests configured"
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      if: always()

  # Stage 2: Build Docker Image
  build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.prod
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Stage 3: Security Scanning
  security:
    name: Security Scanning
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
    
    - name: Run Snyk security scan
      uses: snyk/actions/python@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high
      continue-on-error: true

  # Stage 4: Deploy to Production
  deploy:
    name: Deploy to Hetzner
    needs: [build, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Hetzner via kubectl
      env:
        KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        KUBE_NAMESPACE: jona-production
      run: |
        mkdir -p $HOME/.kube
        echo "$KUBE_CONFIG" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config
        
        # Update image
        kubectl set image deployment/jona-api \
          jona-api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          -n $KUBE_NAMESPACE
        
        # Wait for rollout
        kubectl rollout status deployment/jona-api -n $KUBE_NAMESPACE --timeout=5m
    
    - name: Run smoke tests
      run: |
        sleep 10
        curl -f https://jona.yourdomain.com/health/live || exit 1
      continue-on-error: true

  # Stage 5: Notifications
  notify:
    name: Send Notifications
    needs: [deploy]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify Slack
      uses: slackapi/slack-github-action@v1
      if: always()
      with:
        payload: |
          {
            "text": "JONA Deployment ${{ job.status }}",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*JONA Production Deployment*\nStatus: *${{ job.status }}*\nCommit: ${{ github.sha }}\nAuthor: ${{ github.actor }}"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
