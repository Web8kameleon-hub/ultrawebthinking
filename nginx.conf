# NGINX Reverse Proxy Configuration for JONA
# For Hetzner Production Environment

server {
    listen 80;
    listen [::]:80;
    server_name jona.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jona.yourdomain.com;

    # SSL Certificates (Let's Encrypt via cert-manager)
    ssl_certificate /etc/letsencrypt/live/jona.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jona.yourdomain.com/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/json application/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req zone=api burst=20 nodelay;

    # JONA API Upstream
    upstream jona_api {
        server jona-api-service:80 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Health check endpoint
    location /health/ {
        proxy_pass http://jona_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # API endpoints
    location /api/ {
        proxy_pass http://jona_api;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
    }

    # WebSocket support (for real-time EEG streaming)
    location /ws/ {
        proxy_pass http://jona_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    # File uploads
    location /upload/ {
        proxy_pass http://jona_api;
        client_max_body_size 50m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static files cache
    location ~* ^/static/ {
        proxy_pass http://jona_api;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Metrics (restricted)
    location /metrics {
        proxy_pass http://jona_api;
        allow 10.0.0.0/8;  # Kubernetes internal
        allow 127.0.0.1;
        deny all;
    }

    # Root redirect
    location / {
        return 301 /api/health/live;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Logging
    access_log /var/log/nginx/jona_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/jona_error.log warn;
}
